app:
  name: media-server
  host: 0.0.0.0
  port: 8080
  mode: release
  context_timeout: 60

database:
  path: ./data/media.db
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 3600

scanner:
  max_depth: 10
  exclude_patterns:
    - ".*"
    - "__MACOSX"
    - "Thumbs.db"
  file_size_limit: 10737418240

scraper:
  tmdb_api_key: ${TMDB_API_KEY}
  tmdb_base_url: https://api.themoviedb.org/3
  language: zh-CN
  timeout: 30
  retry_count: 3

stream:
  hls_dir: /tmp/hls
  default_quality: 1080p
  transcode_enabled: true
  hardware_acceleration: false
  max_concurrent: 3

log:
  level: info
  path: ./logs
  max_size: 100
  max_age: 30
  max_backups: 7

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - "*"

rate_limit:
  rps: 100
  bursts: 200
